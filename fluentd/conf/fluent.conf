# HTTP로 데이터 받는 입력 설정
<source>
  @type http          # HTTP 방식으로 데이터 수신
  port 9880           # 9880 포트에서 수신 (BE에서 이 포트로 전송)
  bind 0.0.0.0        # 모든 IP에서 접근 허용
  body_size_limit 32m # 요청 최대 크기 32MB
  keepalive_timeout 10s # 연결 유지 시간 10초
</source>

# kafka.logs 태그로 들어온 데이터를 카프카로 전송
<match kafka.logs>
  @type kafka2        # 카프카로 전송하는 플러그인
  brokers kafka1:9092,kafka2:9092,kafka3:9092 # 카프카 브로커 주소
  default_topic "START_TOPIC" # 전송할 카프카 토픽 이름

  <buffer>            # 전송 전 임시 저장 버퍼 설정
    @type memory      # 메모리에 버퍼 저장
    flush_interval 1s # 1초마다 카프카로 전송
    chunk_limit_size 1m # 청크 최대 크기 1MB
    retry_max_times 1   # 실패 시 최대 1번 재시도
    retry_wait 2s       # 재시도 전 2초 대기
    retry_type exponential_backoff # 재시도 간격 점점 늘리는 방식
  </buffer>

  <format>
    @type json        # JSON 형식으로 카프카에 전송
  </format>
</match>